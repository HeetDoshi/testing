
---
- name: Install Monitoring Tools and Docker on Amazon Linux
  hosts: localhost
  connection: local
  become: yes
  tasks:

    # --- 1. INSTALL DOCKER ---
    - name: Install Docker Engine
      yum:
        name: docker
        state: present
        update_cache: yes

    - name: Start and Enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - ec2-user
        - jenkins
      ignore_errors: yes # In case Jenkins isn't installed yet

    # --- 2. GRAFANA (Using YUM) ---
    - name: Add Grafana Repository
      yum_repository:
        name: grafana
        description: Grafana Repository
        baseurl: https://rpm.grafana.com
        gpgcheck: yes
        gpgkey: https://rpm.grafana.com/gpg.key
        enabled: yes

    - name: Install Grafana
      yum:
        name: grafana
        state: present

    # --- 3. PROMETHEUS (Best Practice: Automated Systemd Install) ---
    - name: Create Prometheus User
      user:
        name: prometheus
        shell: /bin/false
        system: yes

    - name: Create Prometheus Directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
        mode: '0755'
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download and Extract Prometheus
      unarchive:
        src: https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Move Prometheus Binaries
      copy:
        src: "/tmp/prometheus-2.51.0.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        owner: prometheus
        group: prometheus
        remote_src: yes
      loop:
        - prometheus
        - promtool

    - name: Create Default Prometheus Config
      copy:
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: '0644'
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

    - name: Create Prometheus Systemd Service File
      copy:
        dest: /etc/systemd/system/prometheus.service
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=prometheus
          Group=prometheus
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
              --config.file /etc/prometheus/prometheus.yml \
              --storage.tsdb.path /var/lib/prometheus/

          [Install]
          WantedBy=multi-user.target

    - name: Reload Systemd Daemon
      systemd:
        daemon_reload: yes

    # --- 4. MANAGE SERVICES ---
    - name: Start and Enable Monitoring Services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - grafana-server
        - prometheus
